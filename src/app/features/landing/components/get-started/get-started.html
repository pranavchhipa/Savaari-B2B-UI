<section class="py-12 sm:py-20 bg-white relative overflow-hidden">
    <!-- Subtle background decoration -->
    <div class="absolute top-0 right-0 w-96 h-96 bg-amber/5 rounded-full blur-3xl -translate-y-1/2 translate-x-1/3"></div>
    <div class="absolute bottom-0 left-0 w-72 h-72 bg-primary/5 rounded-full blur-3xl translate-y-1/3 -translate-x-1/4"></div>

    <div class="container mx-auto px-4 lg:px-8 max-w-5xl relative z-10">

        <!-- Heading -->
        <div class="mb-14">
            <span class="inline-block text-xs font-bold uppercase tracking-widest text-amber mb-3">HOW IT WORKS</span>
            <h2 class="font-display text-2xl sm:text-3xl md:text-4xl font-extrabold text-slate-900 leading-tight">
                Don't Wait Anymore.<br />
                Get Started in Just <span class="text-gradient-cyan">3 Steps</span>
            </h2>
        </div>

        <!-- Steps with connecting line -->
        <div class="relative">
            <!-- Connecting line (desktop: horizontal) -->
            <div class="hidden sm:block absolute top-8 left-[calc(8.33%+32px)] right-[calc(8.33%+32px)] h-0.5 bg-gradient-to-r from-amber via-rose-400 to-amber/40 z-0"></div>

            <!-- Connecting line (mobile: vertical) -->
            <div class="sm:hidden absolute top-8 bottom-8 left-8 w-0.5 bg-gradient-to-b from-amber via-rose-400 to-amber/40 z-0"></div>

            <div class="grid grid-cols-1 sm:grid-cols-3 gap-8 mb-14">
                <div *ngFor="let step of steps"
                    class="relative flex flex-row sm:flex-col items-start sm:items-center sm:text-center group gap-4 sm:gap-0">

                    <!-- Number circle -->
                    <div
                        class="relative z-10 w-16 h-16 rounded-full bg-gradient-to-br from-amber to-rose-500 flex items-center justify-center sm:mb-5 shadow-lg shadow-amber/25 ring-4 ring-white group-hover:scale-110 transition-transform duration-300 flex-shrink-0">
                        <span class="text-white font-bold text-2xl">{{ step.number }}</span>
                    </div>

                    <div>
                        <!-- Title -->
                        <h3 class="font-display font-bold text-lg text-slate-900 mb-2 leading-snug">
                            {{ step.title }}
                        </h3>

                        <!-- Description -->
                        <p class="text-slate-500 text-sm leading-relaxed max-w-xs">
                            {{ step.description }}
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <!-- CTA Button -->
        <div class="sm:text-center">
            <a routerLink="/register"
                class="inline-flex items-center justify-center rounded-lg bg-gradient-to-r from-amber to-rose-500 hover:from-amber-hover hover:to-rose-600 text-white font-bold text-sm tracking-wide uppercase px-10 py-4 shadow-lg shadow-amber/30 transition-all cursor-pointer border-0 hover:shadow-xl hover:shadow-amber/40 hover:-translate-y-0.5">
                REGISTER
            </a>
        </div>
    </div>
</section>
