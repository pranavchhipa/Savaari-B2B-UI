<section class="relative min-h-[70vh] sm:min-h-screen flex items-start overflow-hidden pt-4 pb-6 sm:pt-8 sm:pb-10">
    <!-- Background image -->
    <div class="absolute inset-0">
        <img src="/hero-bg-innova.jpg" alt="Savaari B2B Car" class="w-full h-full object-cover object-bottom opacity-95"
            loading="eager" fetchpriority="high" />
        <div class="absolute inset-0 bg-gradient-to-r from-slate-900/85 via-slate-900/35 to-transparent"></div>
    </div>

    <div class="container mx-auto px-4 lg:px-8 relative z-10">
        <div class="max-w-3xl">

            <div class="inline-flex items-center gap-2 sm:gap-3 bg-slate-800/80 backdrop-blur-md border border-white/15 rounded-full px-3 py-1.5 sm:px-7 sm:py-3 mb-4 sm:mb-7 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-75 fill-mode-forwards shadow-lg">
                <lucide-icon name="badge-check" [size]="20" class="text-amber-400 sm:[--size:26]"></lucide-icon>
                <span class="text-xs sm:text-base text-white font-extrabold uppercase tracking-widest">Trusted by 5,000+ Agents</span>
            </div>

            <h1
                class="font-display text-2xl sm:text-4xl md:text-5xl lg:text-7xl font-extrabold text-primary-foreground leading-[1.1] tracking-tight mb-4 sm:mb-7 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-100 fill-mode-forwards">
                Your <span class="text-gradient-cyan">Bookings</span>
                <br />Our Cab
                <br /><span class="text-amber">Maximum Earnings</span>
            </h1>

            <p
                class="text-sm sm:text-lg md:text-xl text-white font-semibold leading-relaxed mb-6 sm:mb-9 max-w-2xl animate-in fade-in slide-in-from-bottom-4 duration-700 delay-200 fill-mode-forwards">
                Book one-way, round-trip, airport, and local cabs across 2,000+ cities. Enjoy confirmed rides, GST invoices, and the best prices.
            </p>

            <div
                class="flex flex-col sm:flex-row gap-3 sm:gap-4 mb-6 sm:mb-10 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-300 fill-mode-forwards">
                <button routerLink="/register"
                    class="inline-flex items-center justify-center rounded-md gradient-cyan text-primary-foreground font-bold text-sm sm:text-base shadow-cyan hover:opacity-90 transition-opacity border-0 h-11 sm:h-13 py-2.5 sm:py-3 px-6 sm:px-8 cursor-pointer">
                    Sign Up
                    <lucide-icon name="arrow-right" class="ml-2 h-4 w-4 sm:h-5 sm:w-5"></lucide-icon>
                </button>
                <button routerLink="/login"
                    class="inline-flex items-center justify-center rounded-md bg-amber hover:bg-amber-hover text-white font-bold text-sm sm:text-base h-11 sm:h-13 py-2.5 sm:py-3 px-6 sm:px-8 cursor-pointer border-0 shadow-amber transition-colors">
                    Login
                    <lucide-icon name="arrow-right" class="ml-2 h-4 w-4 sm:h-5 sm:w-5"></lucide-icon>
                </button>
            </div>

            <!-- Mini stats — glass cards -->
            <div
                class="grid grid-cols-3 gap-2 sm:flex sm:gap-4 sm:overflow-visible sm:flex-wrap animate-in fade-in slide-in-from-bottom-4 duration-700 delay-500 fill-mode-forwards">
                <div *ngFor="let stat of stats"
                    class="flex items-center gap-1.5 sm:gap-3 bg-slate-900/70 backdrop-blur-md border border-white/20 rounded-lg sm:rounded-xl px-2 py-2 sm:px-5 sm:py-3.5 hover:bg-slate-900/80 transition-colors">
                    <div class="w-6 h-6 sm:w-10 sm:h-10 rounded-md sm:rounded-lg bg-cyan/20 flex items-center justify-center flex-shrink-0">
                        <lucide-icon [name]="stat.icon" class="w-3 h-3 sm:w-5 sm:h-5 text-cyan"></lucide-icon>
                    </div>
                    <div>
                        <p class="font-bold text-white text-[10px] sm:text-sm leading-tight">{{ stat.label }}</p>
                        <p class="text-[8px] sm:text-[11px] text-white/60 hidden sm:block">{{ stat.sub }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
