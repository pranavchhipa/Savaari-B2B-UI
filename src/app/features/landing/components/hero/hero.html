<section class="relative min-h-[92vh] flex items-center overflow-hidden py-12">
    <!-- Background image -->
    <div class="absolute inset-0">
        <img src="/hero-bg-ertiga.jpg" alt="Savaari B2B Car" class="w-full h-full object-cover origin-center"
            loading="eager" fetchpriority="high" />


        <div class="absolute inset-0 bg-gradient-to-r from-slate-900/85 via-slate-900/35 to-transparent"></div>

    </div>

    <div class="container mx-auto px-4 lg:px-8 relative z-10">
        <div class="max-w-3xl">


            <h1
                class="font-display text-4xl sm:text-5xl lg:text-6xl font-extrabold text-primary-foreground leading-[1.1] tracking-tight mb-6 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-100 fill-mode-forwards">
                Elevate Your Corporate <span class="text-gradient-cyan">Ground Travel</span>
            </h1>

            <p
                class="text-lg sm:text-xl text-primary-foreground/70 leading-relaxed mb-10 max-w-2xl animate-in fade-in slide-in-from-bottom-4 duration-700 delay-200 fill-mode-forwards">
                India's largest vetted fleet across 2,000+ cities. Zero cancellations,
                GST-ready billing, and a dedicated account manager — all from one
                centralized dashboard.
            </p>

            <div
                class="flex flex-col sm:flex-row gap-4 mb-16 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-300 fill-mode-forwards">
                <button routerLink="/register"
                    class="inline-flex items-center justify-center rounded-md gradient-cyan text-primary-foreground font-bold text-base shadow-cyan hover:opacity-90 transition-opacity border-0 h-13 py-3 px-8 cursor-pointer">
                    Partner With Us
                    <lucide-icon name="arrow-right" class="ml-2 h-5 w-5"></lucide-icon>
                </button>
                <button routerLink="/login"
                    class="inline-flex items-center justify-center rounded-md border border-primary-foreground/30 text-primary-foreground hover:bg-primary-foreground/10 font-semibold text-base h-13 py-3 px-8 bg-transparent cursor-pointer">
                    Login
                </button>
            </div>

            <!-- Mini stats -->
            <div
                class="flex flex-wrap gap-8 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-500 fill-mode-forwards">
                <div *ngFor="let stat of stats" class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-lg bg-primary/20 flex items-center justify-center">
                        <lucide-icon [name]="stat.icon" class="w-5 h-5 text-cyan"></lucide-icon>
                    </div>
                    <div>
                        <p class="font-semibold text-primary-foreground text-sm">{{ stat.label }}</p>
                        <p class="text-xs text-primary-foreground/50">{{ stat.sub }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
