<section class="relative sm:min-h-screen flex items-start overflow-hidden pt-4 pb-8 sm:pt-8 sm:pb-10">
    <!-- Background image -->
    <div class="absolute inset-0">
        <img src="/hero-bg-innova.jpg" alt="Savaari B2B Car" class="w-full h-full object-cover object-bottom opacity-95"
            loading="eager" fetchpriority="high" />
        <div class="absolute inset-0 bg-gradient-to-b sm:bg-gradient-to-r from-slate-900/90 via-slate-900/60 to-slate-900/30 sm:from-slate-900/85 sm:via-slate-900/35 sm:to-transparent"></div>
    </div>

    <div class="container mx-auto px-4 lg:px-8 relative z-10">
        <div class="max-w-3xl">

            <div class="inline-flex items-center gap-1.5 sm:gap-2 bg-slate-800/80 backdrop-blur-md border border-white/15 rounded-full px-2.5 py-1 sm:px-5 sm:py-2 mb-3 sm:mb-5 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-75 fill-mode-forwards shadow-lg">
                <lucide-icon name="badge-check" [size]="16" class="text-amber-400 sm:[--size:20]"></lucide-icon>
                <span class="text-[10px] sm:text-sm text-white font-extrabold uppercase tracking-widest">Trusted by 5,000+ Agents</span>
            </div>

            <h1
                class="font-display text-xl sm:text-3xl md:text-4xl lg:text-5xl font-extrabold text-primary-foreground leading-[1.1] tracking-tight mb-3 sm:mb-5 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-100 fill-mode-forwards">
                Your <span class="text-gradient-cyan">Bookings</span>
                <br />Our Cab
                <br /><span class="text-amber">Maximum Earnings</span>
            </h1>

            <p
                class="text-xs sm:text-base md:text-lg text-white font-semibold leading-relaxed mb-4 sm:mb-7 max-w-2xl animate-in fade-in slide-in-from-bottom-4 duration-700 delay-200 fill-mode-forwards">
                Book one-way, round-trip, airport, and local cabs across 2,000+ cities. Enjoy confirmed rides, GST invoices, and the best prices.
            </p>

            <div
                class="flex flex-row gap-3 mb-5 sm:mb-8 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-300 fill-mode-forwards">
                <button routerLink="/login"
                    class="inline-flex items-center justify-center rounded-md bg-amber hover:bg-amber-hover text-white font-bold text-xs sm:text-sm h-10 sm:h-11 py-2 sm:py-2.5 px-5 sm:px-7 cursor-pointer border-0 shadow-amber transition-colors">
                    Login
                </button>
                <button routerLink="/register"
                    class="inline-flex items-center justify-center rounded-md gradient-cyan text-primary-foreground font-bold text-xs sm:text-sm shadow-cyan hover:opacity-90 transition-opacity border-0 h-10 sm:h-11 py-2 sm:py-2.5 px-5 sm:px-7 cursor-pointer">
                    Register
                </button>
            </div>

            <!-- Mini stats — glass cards -->
            <div
                class="grid grid-cols-3 gap-2 sm:flex sm:gap-4 sm:overflow-visible sm:flex-wrap animate-in fade-in slide-in-from-bottom-4 duration-700 delay-500 fill-mode-forwards">
                <div *ngFor="let stat of stats"
                    class="flex items-center gap-1.5 sm:gap-3 bg-slate-900/70 backdrop-blur-md border border-white/20 rounded-lg sm:rounded-xl px-2 py-2 sm:px-5 sm:py-3.5 hover:bg-slate-900/80 transition-colors">
                    <div class="w-6 h-6 sm:w-10 sm:h-10 rounded-md sm:rounded-lg bg-cyan/20 flex items-center justify-center flex-shrink-0">
                        <lucide-icon [name]="stat.icon" class="w-3 h-3 sm:w-5 sm:h-5 text-cyan"></lucide-icon>
                    </div>
                    <div>
                        <p class="font-bold text-white text-[10px] sm:text-sm leading-tight">{{ stat.label }}</p>
                        <p class="text-[8px] sm:text-[11px] text-white/60 hidden sm:block">{{ stat.sub }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
