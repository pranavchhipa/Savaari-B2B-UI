<section class="relative min-h-[100svh] sm:min-h-screen flex flex-col overflow-hidden">
    <!-- Background image -->
    <div class="absolute inset-0">
        <img src="/hero-bg-innova.jpg" alt="Savaari B2B Car" class="w-full h-full object-cover object-[75%_center] sm:object-bottom opacity-95"
            loading="eager" fetchpriority="high" />
        <!-- Mobile: dark top fading to clear bottom so car shows -->
        <div class="absolute inset-0 bg-gradient-to-b from-slate-900/95 via-slate-900/60 to-slate-900/20 sm:hidden"></div>
        <!-- Desktop: left to right gradient -->
        <div class="absolute inset-0 hidden sm:block bg-gradient-to-r from-slate-900/85 via-slate-900/35 to-transparent"></div>
    </div>

    <!-- Content — pushed to top on mobile, centered on desktop -->
    <div class="container mx-auto px-5 lg:px-8 relative z-10 pt-24 sm:pt-10">
        <div class="max-w-3xl">

            <div class="inline-flex items-center gap-1.5 sm:gap-2 bg-white/10 backdrop-blur-md border border-white/20 rounded-full px-3 py-1.5 sm:px-5 sm:py-2 mb-4 sm:mb-5 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-75 fill-mode-forwards shadow-lg">
                <lucide-icon name="badge-check" [size]="14" class="text-amber-400 sm:[--size:20]"></lucide-icon>
                <span class="text-[9px] sm:text-sm text-white font-extrabold uppercase tracking-[0.15em] sm:tracking-widest">Trusted by 5,000+ Agents</span>
            </div>

            <h1
                class="font-display text-[42px] sm:text-5xl md:text-5xl lg:text-6xl font-extrabold text-primary-foreground leading-[1.05] tracking-tight mb-4 sm:mb-5 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-100 fill-mode-forwards">
                Your <span class="text-gradient-cyan">Bookings</span>
                <br />Our Cab
                <br /><span class="text-amber">Maximum Earnings</span>
            </h1>

            <p
                class="text-[13px] sm:text-base md:text-lg text-white font-normal leading-relaxed mb-5 sm:mb-6 max-w-sm sm:max-w-2xl animate-in fade-in slide-in-from-bottom-4 duration-700 delay-200 fill-mode-forwards">
                Book Round-Trip, One-Way, Airport Transfers, and Local rentals across 2,000+ cities. Confirmed rides, GST invoices, best prices.
            </p>

            <div
                class="flex flex-row gap-3 mb-6 sm:mb-8 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-300 fill-mode-forwards">
                <button routerLink="/login"
                    class="inline-flex items-center justify-center rounded-lg bg-amber hover:bg-amber-hover text-white font-bold text-sm sm:text-base h-11 sm:h-13 py-2.5 sm:py-3 px-7 sm:px-9 cursor-pointer border-0 shadow-amber transition-colors">
                    Login
                </button>
                <button routerLink="/register"
                    class="inline-flex items-center justify-center rounded-lg gradient-cyan text-primary-foreground font-bold text-sm sm:text-base shadow-cyan hover:opacity-90 transition-opacity border-0 h-11 sm:h-13 py-2.5 sm:py-3 px-7 sm:px-9 cursor-pointer">
                    Register
                </button>
            </div>

            <!-- Desktop: big number stats clean -->
            <div class="hidden sm:flex items-center gap-7 animate-in fade-in slide-in-from-bottom-4 duration-700 delay-500 fill-mode-forwards">
                <ng-container *ngFor="let stat of stats; let last = last">
                    <div class="flex items-center gap-2.5 group cursor-default">
                        <div class="w-10 h-10 rounded-lg bg-cyan/15 flex items-center justify-center group-hover:bg-cyan/25 transition-colors duration-300">
                            <lucide-icon [name]="stat.icon" [size]="20" class="text-cyan"></lucide-icon>
                        </div>
                        <span class="text-[2.5rem] font-black bg-gradient-to-r from-cyan to-amber bg-clip-text text-transparent leading-none group-hover:drop-shadow-[0_0_15px_rgba(6,182,212,0.4)] transition-all duration-300">{{ stat.number }}</span>
                        <span class="text-white text-sm font-medium leading-tight">{{ stat.text }}</span>
                    </div>
                    <span *ngIf="!last" class="w-px h-8 bg-white/15"></span>
                </ng-container>
            </div>
        </div>
    </div>

    <!-- Mobile only: stats bar pinned to bottom -->
    <div class="relative z-10 mt-auto sm:hidden">
        <div class="relative overflow-hidden bg-slate-900/85 backdrop-blur-xl border-t border-white/10">
            <!-- Shimmer sweep -->
            <div class="absolute inset-0 animate-[shimmerSweep_3s_ease_infinite]"
                style="background: linear-gradient(105deg, transparent 40%, rgba(6,182,212,0.08) 45%, rgba(6,182,212,0.15) 50%, rgba(6,182,212,0.08) 55%, transparent 60%); background-size: 200% 100%;"></div>
            <!-- Top glow line -->
            <div class="absolute top-0 left-0 right-0 h-[1px]"
                style="background: linear-gradient(90deg, transparent, rgba(6,182,212,0.5), rgba(245,158,11,0.4), transparent);"></div>
            <div class="relative flex items-center justify-around py-2.5 px-3">
                <ng-container *ngFor="let stat of stats; let last = last">
                    <div class="flex flex-col items-center">
                        <span class="text-xl font-black bg-gradient-to-r from-cyan to-amber bg-clip-text text-transparent leading-none drop-shadow-[0_0_10px_rgba(6,182,212,0.4)]">{{ stat.number }}</span>
                        <span class="text-[9px] text-white/50 font-semibold uppercase tracking-wider mt-1.5">{{ stat.text }}</span>
                    </div>
                    <span *ngIf="!last" class="w-px h-9 bg-gradient-to-b from-transparent via-cyan/20 to-transparent"></span>
                </ng-container>
            </div>
        </div>
    </div>
</section>
