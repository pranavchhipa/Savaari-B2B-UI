<section id="value-props" class="py-24 bg-slate-50">
    <div class="container mx-auto px-4 lg:px-8">
        <div class="text-center mb-16 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <span class="inline-block text-xs font-bold uppercase tracking-widest text-amber mb-4">
                WHY CHOOSE SAVAARI B2B
            </span>
            <h2
                class="font-display text-3xl sm:text-4xl font-extrabold text-slate-900 leading-tight max-w-2xl mx-auto">
                Everything Your Enterprise Needs for
                <span class="text-gradient-cyan">Ground Mobility</span>
            </h2>
        </div>

        <div class="max-w-5xl mx-auto">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                <div *ngFor="let prop of props; let i = index"
                    class="bg-white rounded-2xl border border-slate-200 p-6 shadow-card hover:shadow-card-hover transition-all duration-300 group"
                    [ngClass]="{'lg:col-start-1': i === 3 && props.length === 5, 'lg:col-start-2': i === 4 && props.length === 5}">
                    <div class="flex items-start justify-between mb-4">
                        <div
                            class="w-12 h-12 rounded-xl bg-slate-100 group-hover:bg-primary/10 flex items-center justify-center transition-colors duration-300">
                            <lucide-icon [name]="prop.icon"
                                class="w-6 h-6 text-primary transition-colors duration-300"></lucide-icon>
                        </div>
                        <span
                            class="text-[10px] font-bold uppercase tracking-wider px-2.5 py-1 rounded-full bg-amber/10 text-amber border border-amber/20">
                            {{ prop.highlight }}
                        </span>
                    </div>
                    <h3 class="font-display font-bold text-base text-slate-900 mb-2 leading-snug">
                        {{ prop.title }}
                    </h3>
                    <p class="text-slate-500 text-sm leading-relaxed">
                        {{ prop.description }}
                    </p>
                </div>
            </div>
        </div>
    </div>
</section>
