<footer class="gradient-cyan-dark text-primary-foreground">
    <div class="container mx-auto px-4 lg:px-8 py-12">
        <div class="grid grid-cols-1 sm:grid-cols-4 gap-10">
            <!-- Logo + tagline -->
            <div>
                <div class="flex items-start group mb-3">
                    <img src="assets/logos/b2b-cab-logo-white.webp" alt="B2B CAB" class="h-12 object-contain" />
                </div>
                <p class="text-sm text-primary-foreground/60 leading-relaxed">
                    India's trusted B2B cab booking platform for travel agents.
                </p>
            </div>

            <!-- Quick Links -->
            <div>
                <h4 class="font-bold text-sm uppercase tracking-wider text-primary-foreground mb-4">
                    Quick Links
                </h4>
                <div class="flex flex-col gap-2">
                    <a href="#solutions"
                        class="text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Solutions
                    </a>
                    <a href="#value-props"
                        class="text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Why B2B CAB
                    </a>
                    <a href="#overview"
                        class="text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        About
                    </a>
                    <a href="#cta"
                        class="text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Contact
                    </a>
                </div>
            </div>

            <!-- Company -->
            <div>
                <h4 class="font-bold text-sm uppercase tracking-wider text-primary-foreground mb-4">
                    Company
                </h4>
                <div class="flex flex-col gap-2">
                    <a routerLink="/about-us"
                        class="text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        About Us
                    </a>
                    <a routerLink="/privacy-policy"
                        class="text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Privacy Policy
                    </a>
                    <a routerLink="/terms-conditions"
                        class="text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Terms & Conditions
                    </a>
                </div>
            </div>

            <!-- Get in Touch -->
            <div>
                <h4 class="font-bold text-sm uppercase tracking-wider text-primary-foreground mb-4">
                    Get in Touch
                </h4>
                <a routerLink="/contact-us"
                    class="block text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                    Contact Us
                </a>
                <div class="flex items-center gap-1.5 mt-2 text-sm text-primary-foreground/70">
                    <lucide-icon name="headset" [size]="14"></lucide-icon>
                    <span>Customer Care 24x7: {{ supportPhone }}</span>
                </div>
            </div>
        </div>

        <div
            class="mt-10 pt-6 border-t border-primary-foreground/15 flex flex-col sm:flex-row justify-between items-center gap-4">
            <p class="text-sm text-primary-foreground/50">
                © Copyright {{ brandName }}.
            </p>
            <p class="text-sm text-primary-foreground/50">
                Powered by {{ companyName }}.
            </p>
        </div>
    </div>
</footer>
