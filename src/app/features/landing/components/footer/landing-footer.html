<footer class="gradient-cyan-dark text-primary-foreground">
    <div class="container mx-auto px-4 lg:px-8 py-5 sm:py-12">
        <div class="grid grid-cols-3 lg:grid-cols-4 gap-3 sm:gap-10">
            <!-- Logo + tagline — hidden on mobile, shown on desktop -->
            <div class="hidden lg:block col-span-1">
                <div class="flex items-start group mb-3">
                    <img src="assets/logos/b2b-cab-logo-white.webp" alt="B2B CAB" class="h-12 object-contain" />
                </div>
                <p class="text-sm text-primary-foreground/60 leading-relaxed">
                    India's trusted B2B cab booking platform for travel agents.
                </p>
            </div>

            <!-- Quick Links -->
            <div>
                <h4 class="font-bold text-[9px] sm:text-sm uppercase tracking-wider text-primary-foreground mb-1.5 sm:mb-4">
                    Quick Links
                </h4>
                <div class="flex flex-col gap-1 sm:gap-2">
                    <a href="#solutions"
                        class="text-[10px] sm:text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Solutions
                    </a>
                    <a href="#value-props"
                        class="text-[10px] sm:text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Why B2B CAB
                    </a>
                    <a href="#overview"
                        class="text-[10px] sm:text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        About
                    </a>
                </div>
            </div>

            <!-- Company -->
            <div>
                <h4 class="font-bold text-[9px] sm:text-sm uppercase tracking-wider text-primary-foreground mb-1.5 sm:mb-4">
                    Company
                </h4>
                <div class="flex flex-col gap-1 sm:gap-2">
                    <a routerLink="/about-us"
                        class="text-[10px] sm:text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        About Us
                    </a>
                    <a routerLink="/privacy-policy"
                        class="text-[10px] sm:text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Privacy
                    </a>
                    <a routerLink="/terms-conditions"
                        class="text-[10px] sm:text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                        Terms
                    </a>
                </div>
            </div>

            <!-- Get in Touch -->
            <div>
                <h4 class="font-bold text-[9px] sm:text-sm uppercase tracking-wider text-primary-foreground mb-1.5 sm:mb-4">
                    Contact
                </h4>
                <a routerLink="/contact-us"
                    class="block text-[10px] sm:text-sm text-primary-foreground/70 hover:text-primary-foreground transition-colors cursor-pointer">
                    Contact Us
                </a>
                <div class="flex items-center gap-1 sm:gap-1.5 mt-1 sm:mt-2 text-[10px] sm:text-sm text-primary-foreground/70">
                    <lucide-icon name="headset" [size]="11" class="sm:!w-[14px] sm:!h-[14px]"></lucide-icon>
                    <span>{{ supportPhone }}</span>
                </div>
            </div>
        </div>

        <div
            class="mt-3 sm:mt-10 pt-3 sm:pt-6 border-t border-primary-foreground/15 flex flex-row justify-between items-center gap-2 sm:gap-4">
            <p class="text-[9px] sm:text-sm text-primary-foreground/50">
                © {{ brandName }}
            </p>
            <p class="text-[9px] sm:text-sm text-primary-foreground/50">
                Powered by {{ companyName }}
            </p>
        </div>
    </div>
</footer>
