<section id="solutions" class="py-8 sm:py-16 bg-background">
    <div class="container mx-auto px-4 lg:px-8">
        <div class="text-center mb-5 sm:mb-16 animate-in fade-in slide-in-from-bottom-4 duration-700">
            <span class="inline-block text-[10px] sm:text-xs font-bold uppercase tracking-widest text-primary mb-1.5 sm:mb-4">
                Solutions
            </span>
            <h2
                class="font-display text-xl sm:text-3xl md:text-4xl font-extrabold text-foreground leading-tight max-w-2xl mx-auto">
                Built for Travel Agents
            </h2>
        </div>

        <div
            class="grid lg:grid-cols-3 gap-0 lg:gap-0 rounded-xl sm:rounded-2xl overflow-hidden border border-border animate-in fade-in slide-in-from-bottom-8 duration-700">
            <div *ngFor="let sol of solutions; let i = index; let isLast = last"
                [ngClass]="{'lg:border-r border-b lg:border-b-0 border-border': !isLast}"
                class="group p-4 sm:p-8 lg:p-10 bg-background hover:bg-secondary/50 transition-all duration-300 flex flex-col">
                <div
                    class="w-9 h-9 sm:w-14 sm:h-14 rounded-lg sm:rounded-xl bg-cyan-light flex items-center justify-center mb-3 sm:mb-6 group-hover:gradient-cyan transition-colors duration-300">
                    <lucide-icon [name]="sol.icon"
                        class="w-4 h-4 sm:w-7 sm:h-7 text-primary group-hover:text-primary-foreground transition-colors duration-300"></lucide-icon>
                </div>
                <h3 class="font-display font-bold text-sm sm:text-xl text-foreground mb-1 sm:mb-3">
                    {{ sol.title }}
                </h3>
                <p class="text-muted-foreground text-xs sm:text-sm leading-relaxed mb-3 sm:mb-6 flex-1">
                    {{ sol.description }}
                </p>
                <ul class="space-y-1.5 sm:space-y-2.5 mb-3 sm:mb-6">
                    <li *ngFor="let f of sol.features" class="flex items-center gap-1.5 sm:gap-3 text-xs sm:text-sm text-foreground">
                        <div class="w-4 h-4 sm:w-6 sm:h-6 rounded-full bg-emerald-100 flex items-center justify-center flex-shrink-0">
                            <lucide-icon name="check" class="w-2.5 h-2.5 sm:w-4 sm:h-4 text-emerald-600"></lucide-icon>
                        </div>
                        {{ f }}
                    </li>
                </ul>
                <a href="#cta"
                    class="inline-flex items-center gap-1.5 text-xs sm:text-sm font-semibold text-primary hover:text-cyan-dark transition-colors group/link cursor-pointer">
                    Learn more
                    <lucide-icon name="arrow-right"
                        class="w-3.5 h-3.5 sm:w-4 sm:h-4 group-hover/link:translate-x-1 transition-transform"></lucide-icon>
                </a>
            </div>
        </div>
    </div>
</section>
