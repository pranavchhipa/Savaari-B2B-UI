<nav
    [ngClass]="{
        'shadow-lg shadow-primary/5': scrolled,
        'shadow-md shadow-slate-900/10': !scrolled
    }"
    class="relative bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 border-b border-white/5 transition-all duration-300">

    <!-- Subtle gradient line at bottom -->
    <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-cyan/40 to-transparent"></div>

    <!-- Main nav bar -->
    <div class="container mx-auto flex items-center justify-between h-14 px-4 lg:px-8">

        <!-- Left: Logo -->
        <a href="#" class="flex items-center group flex-shrink-0">
            <div
                class="bg-primary text-white font-bold px-3 py-1 rounded skew-x-[-10deg] shadow-lg group-hover:bg-primary-dark transition-colors border border-primary/20">
                <span class="skew-x-[10deg] inline-block tracking-wide text-xl">B2B CAB</span>
            </div>
        </a>

        <!-- Center: Phone pill (desktop) -->
        <div class="hidden md:flex items-center justify-center">
            <a href="tel:09045450000"
                class="inline-flex items-center bg-primary/90 hover:bg-primary text-white rounded-full pl-1.5 pr-5 py-1 shadow-md shadow-primary/20 hover:shadow-primary/40 transition-all cursor-pointer whitespace-nowrap">
                <span
                    class="inline-flex items-center bg-white/20 rounded-full px-2.5 py-0.5 text-[11px] font-bold tracking-wide mr-2">
                    <lucide-icon name="phone" class="w-3.5 h-3.5 mr-1"></lucide-icon>
                    24x7
                </span>
                <span class="text-[14px] font-semibold tracking-wide">090 4545 0000</span>
            </a>
        </div>

        <!-- Right: Nav links + Login / Register (desktop) -->
        <div class="hidden md:flex items-center gap-1">
            <a *ngFor="let link of navLinks" [href]="link.href"
                class="text-[13px] font-medium text-slate-300 hover:text-white px-2.5 py-1.5 rounded-md hover:bg-white/8 transition-all cursor-pointer">
                {{ link.label }}
            </a>
            <span class="w-px h-4 bg-white/15 mx-2"></span>
            <a routerLink="/login"
                class="text-[13px] font-semibold text-slate-200 hover:text-white px-2.5 py-1.5 rounded-md hover:bg-white/8 transition-all cursor-pointer">
                Login
            </a>
            <a routerLink="/register"
                class="text-[13px] font-semibold text-slate-200 hover:text-white px-2.5 py-1.5 rounded-md hover:bg-white/8 transition-all cursor-pointer">
                Register
            </a>
        </div>

        <!-- Mobile: Phone pill + hamburger -->
        <div class="md:hidden flex items-center gap-2">
            <a href="tel:09045450000"
                class="inline-flex items-center bg-primary/90 text-white rounded-full pl-1 pr-3 py-0.5 text-[11px] font-semibold whitespace-nowrap">
                <span class="inline-flex items-center bg-white/20 rounded-full px-1.5 py-0.5 text-[9px] font-bold tracking-wide mr-1.5">
                    <lucide-icon name="phone" class="w-3 h-3 mr-0.5"></lucide-icon>
                    24x7
                </span>
                090 4545 0000
            </a>
            <button (click)="toggleMobile()" class="p-2 text-slate-300 bg-transparent border-0 cursor-pointer">
                <lucide-icon [name]="mobileOpen ? 'x' : 'menu'" [size]="20"></lucide-icon>
            </button>
        </div>
    </div>

    <!-- Mobile menu -->
    <div *ngIf="mobileOpen"
        class="md:hidden overflow-hidden bg-slate-900 border-t border-white/5 animate-in slide-in-from-top-2 duration-200">
        <div class="px-4 py-4 flex flex-col gap-3">
            <a *ngFor="let link of navLinks" [href]="link.href" (click)="toggleMobile()"
                class="text-sm font-medium text-slate-300 hover:text-white py-2 cursor-pointer transition-colors">
                {{ link.label }}
            </a>
            <div class="flex gap-4 pt-2 border-t border-white/10">
                <a routerLink="/login" class="text-sm font-semibold text-slate-200 hover:text-white py-2 cursor-pointer transition-colors">
                    Login
                </a>
                <a routerLink="/register" class="text-sm font-semibold text-slate-200 hover:text-white py-2 cursor-pointer transition-colors">
                    Register
                </a>
            </div>
        </div>
    </div>
</nav>
