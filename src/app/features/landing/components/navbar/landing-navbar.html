<nav
    [ngClass]="{
        'shadow-lg shadow-primary/5': scrolled,
        'shadow-md shadow-slate-900/10': !scrolled
    }"
    class="relative bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 border-b border-white/5 transition-all duration-300">

    <!-- Subtle gradient line at bottom -->
    <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-cyan/40 to-transparent"></div>

    <!-- Main nav bar -->
    <div class="container mx-auto flex items-center justify-between h-16 px-4 lg:px-8">

        <!-- Left: Logo -->
        <a href="#" class="flex items-center group flex-shrink-0">
            <img src="assets/logos/b2b-cab-logo-white.webp" alt="B2B CAB" class="h-20 object-contain" />
        </a>

        <!-- Center: Phone pill (desktop) -->
        <div class="hidden md:flex items-center justify-center absolute left-1/2 -translate-x-1/2">
            <a [href]="supportPhoneTel"
                class="inline-flex items-center text-white hover:text-white/90 bg-white/10 hover:bg-white/15 backdrop-blur-sm border border-white/15 rounded-full pl-3.5 pr-5 py-2 transition-all cursor-pointer whitespace-nowrap">
                <span class="inline-flex items-center text-xs font-bold tracking-wide mr-3 text-cyan-400">
                    <lucide-icon name="phone" class="w-3.5 h-3.5 mr-1.5"></lucide-icon>
                    24x7
                </span>
                <span class="text-sm font-bold tracking-wider">{{ supportPhone }}</span>
            </a>
        </div>

        <!-- Right: Login + Register buttons (desktop) -->
        <div class="hidden md:flex items-center gap-3">
            <a routerLink="/login"
                class="inline-flex items-center justify-center text-sm font-bold text-white bg-amber hover:bg-amber-hover rounded-md px-5 py-2 transition-all cursor-pointer shadow-md shadow-amber/20">
                Login
            </a>
            <a routerLink="/register"
                class="inline-flex items-center justify-center text-sm font-bold text-white bg-primary hover:bg-primary-dark rounded-md px-5 py-2 transition-all cursor-pointer shadow-md shadow-primary/20">
                Register
            </a>
        </div>

        <!-- Mobile: Phone pill + hamburger -->
        <div class="md:hidden flex items-center gap-2">
            <a [href]="supportPhoneTel"
                class="inline-flex items-center bg-primary/90 text-white rounded-full pl-1 pr-3 py-0.5 text-[11px] font-semibold whitespace-nowrap">
                <span class="inline-flex items-center bg-white/20 rounded-full px-1.5 py-0.5 text-[9px] font-bold tracking-wide mr-1.5">
                    <lucide-icon name="phone" class="w-3 h-3 mr-0.5"></lucide-icon>
                    24x7
                </span>
                {{ supportPhone }}
            </a>
            <button (click)="toggleMobile()" class="p-2 text-slate-300 bg-transparent border-0 cursor-pointer">
                <lucide-icon [name]="mobileOpen ? 'x' : 'menu'" [size]="20"></lucide-icon>
            </button>
        </div>
    </div>

    <!-- Mobile menu -->
    <div *ngIf="mobileOpen"
        class="md:hidden overflow-hidden bg-slate-900 border-t border-white/5 animate-in slide-in-from-top-2 duration-200">
        <div class="px-4 py-4 flex flex-col gap-3">
            <div class="flex gap-3 pt-2">
                <a routerLink="/login" (click)="toggleMobile()"
                    class="flex-1 text-center text-sm font-bold text-white border border-white/20 rounded-md px-4 py-2.5 cursor-pointer transition-colors hover:bg-white/10">
                    Login
                </a>
                <a routerLink="/register" (click)="toggleMobile()"
                    class="flex-1 text-center text-sm font-bold text-white bg-primary rounded-md px-4 py-2.5 cursor-pointer transition-colors hover:bg-primary-dark">
                    Register
                </a>
            </div>
        </div>
    </div>
</nav>
