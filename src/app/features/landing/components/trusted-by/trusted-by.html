<section class="py-12 bg-secondary border-b border-border overflow-hidden">
    <div class="container mx-auto px-4 lg:px-8 mb-6">
        <p class="text-center text-sm font-medium text-muted-foreground uppercase tracking-widest">
            Trusted by India's leading enterprises
        </p>
    </div>
    <div class="relative">
        <div class="absolute left-0 top-0 bottom-0 w-24 bg-gradient-to-r from-secondary to-transparent z-10"></div>
        <div class="absolute right-0 top-0 bottom-0 w-24 bg-gradient-to-l from-secondary to-transparent z-10"></div>
        <div class="flex animate-marquee">
            <div *ngFor="let name of allLogos; let i = index"
                class="flex-shrink-0 mx-8 flex items-center justify-center">
                <span class="text-lg font-bold text-muted-foreground/40 tracking-wide whitespace-nowrap select-none">
                    {{ name }}
                </span>
            </div>
        </div>
    </div>
</section>
