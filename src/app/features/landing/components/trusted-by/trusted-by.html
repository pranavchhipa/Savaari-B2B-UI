<section class="py-16 bg-white border-b border-slate-100 overflow-hidden">
    <div class="container mx-auto px-4 lg:px-8 mb-10">
        <p class="text-center text-xs font-semibold text-slate-400 uppercase tracking-[0.25em]">
            Trusted by India's leading enterprises
        </p>
    </div>
    <div class="relative">
        <div class="absolute left-0 top-0 bottom-0 w-32 bg-gradient-to-r from-white to-transparent z-10"></div>
        <div class="absolute right-0 top-0 bottom-0 w-32 bg-gradient-to-l from-white to-transparent z-10"></div>
        <div class="flex items-center animate-marquee">
            <div *ngFor="let item of allLogos"
                class="flex-shrink-0 mx-12 flex items-center justify-center hover:scale-110 transition-transform duration-300 cursor-default">
                <img [src]="item.src"
                     [alt]="item.name"
                     class="h-10 w-auto object-contain"
                     loading="lazy" />
            </div>
        </div>
    </div>
</section>
