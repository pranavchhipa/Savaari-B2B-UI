<app-landing-navbar></app-landing-navbar>

<div class="min-h-screen bg-slate-50 dark:bg-slate-900" *ngIf="pageData">

  <!-- Header -->
  <div class="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 py-5 md:py-6">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
      <nav class="flex text-xs text-slate-400 mb-2">
        <a routerLink="/" class="hover:text-white transition-colors">Home</a>
        <span class="mx-2">&rsaquo;</span>
        <span class="text-white">{{ pageData.title }}</span>
      </nav>
      <div class="flex items-center gap-3">
        <lucide-icon [name]="pageData.icon" [size]="22" class="text-primary"></lucide-icon>
        <h1 class="text-xl md:text-2xl font-bold text-white">{{ pageData.title }}</h1>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-10 md:py-14">
    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 p-6 md:p-10">

      <ng-container *ngFor="let section of pageData.sections">

        <!-- Section Heading -->
        <h2 *ngIf="section.heading"
          class="text-lg font-bold text-slate-800 dark:text-slate-200 mt-8 mb-4 first:mt-0 border-l-4 border-primary pl-4">
          {{ section.heading }}
        </h2>

        <!-- Text content -->
        <ng-container *ngIf="!section.type || section.type === 'text'">
          <p *ngFor="let para of section.content"
            class="text-sm text-slate-600 dark:text-slate-400 leading-relaxed mb-3">
            {{ para }}
          </p>
        </ng-container>

        <!-- List content -->
        <ul *ngIf="section.type === 'list'" class="space-y-2 mb-4 ml-1">
          <li *ngFor="let item of section.content"
            class="flex items-start gap-3 text-sm text-slate-600 dark:text-slate-400 leading-relaxed">
            <span class="w-1.5 h-1.5 rounded-full bg-primary mt-2 shrink-0"></span>
            <span>{{ item }}</span>
          </li>
        </ul>

        <!-- Address content -->
        <div *ngIf="section.type === 'address'"
          class="bg-slate-50 dark:bg-slate-700/30 rounded-xl p-5 border border-slate-200 dark:border-slate-600 mb-4">
          <p *ngFor="let line of section.content"
            class="text-sm font-medium text-slate-700 dark:text-slate-300 leading-relaxed">
            {{ line }}
          </p>
        </div>

      </ng-container>

    </div>
  </div>
</div>

<app-footer></app-footer>
