<nav *ngIf="!isLandingPage" [ngClass]="{
    'sticky top-0 z-50 border-b transition-all duration-300': true,
    'shadow-lg shadow-primary/5': isScrolled,
    'shadow-md shadow-slate-900/10': !isScrolled
  }"
  class="bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900 border-white/5">
  <div class="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-16 relative">
      <div class="flex items-center gap-2 sm:gap-4 md:gap-8">
        <div class="flex-shrink-0 flex items-center gap-2 cursor-pointer group outline-none focus:outline-none"
          [routerLink]="isPublicRoute ? '/' : '/dashboard'"
          tabindex="-1">
          <!-- Agent uploaded logo -->
          <img *ngIf="agentLogo" [src]="agentLogo" alt="Company Logo"
            class="h-10 sm:h-12 md:h-14 max-w-[180px] object-contain rounded" />
          <!-- Default B2B CAB logo (shown when no agent logo) -->
          <img *ngIf="!agentLogo" src="assets/logos/b2b-cab-logo-white.webp" [alt]="brandName"
            class="h-14 sm:h-16 md:h-20 lg:h-24 object-contain" />
        </div>

        <!-- Company Name (shown when logged in) -->
        <span *ngIf="!isPublicRoute && companyName"
          class="hidden md:inline text-sm lg:text-base font-semibold text-white/80 truncate max-w-[200px]">
          {{ companyName }}
        </span>
      </div>

      <!-- Customer Care 24x7 pill — centered -->
      <div class="hidden lg:flex absolute left-1/2 -translate-x-[60%]">
        <a [href]="supportPhoneTel"
          class="inline-flex items-center text-white/90 hover:text-white border-2 border-white/30 hover:border-white/50 rounded-md pl-3 pr-5 py-1.5 transition-all cursor-pointer whitespace-nowrap bg-white/5">
          <span class="inline-flex items-center text-sm font-bold tracking-wide mr-3 border-r-2 border-white/30 pr-3">
            <lucide-icon name="phone" [size]="14" class="mr-1.5"></lucide-icon>
            24x7
          </span>
          <span class="text-base font-bold tracking-wider">{{ supportPhone }}</span>
        </a>
      </div>
      <div class="flex items-center space-x-2 md:space-x-4">

        <!-- PUBLIC VIEW -->
        <ng-container *ngIf="isPublicRoute">
          <div class="hidden md:flex items-center gap-6 mr-6">
            <a href="/#solutions"
              class="text-sm font-semibold text-white/70 hover:text-white transition-all duration-300 relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-0.5 after:bottom-0 after:left-0 after:bg-primary after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left">
              Solutions
            </a>
            <a href="/#value-props"
              class="text-sm font-semibold text-white/70 hover:text-white transition-all duration-300 relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-0.5 after:bottom-0 after:left-0 after:bg-primary after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left">
              Why B2B CAB
            </a>
            <a href="/#overview"
              class="text-sm font-semibold text-white/70 hover:text-white transition-all duration-300 relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-0.5 after:bottom-0 after:left-0 after:bg-primary after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left">
              About
            </a>
            <a href="/#cta"
              class="text-sm font-semibold text-white/70 hover:text-white transition-all duration-300 relative after:content-[''] after:absolute after:w-full after:scale-x-0 after:h-0.5 after:bottom-0 after:left-0 after:bg-primary after:origin-bottom-right after:transition-transform after:duration-300 hover:after:scale-x-100 hover:after:origin-bottom-left">
              Contact
            </a>
          </div>

        </ng-container>

        <!-- B2B PORTAL VIEW -->
        <ng-container *ngIf="!isPublicRoute">
          <div class="flex items-center">

            <div class="flex items-center space-x-1.5 sm:space-x-4 overflow-x-auto hide-scrollbar max-w-full mr-1 sm:mr-2">

              <!-- Core Navigation: Home + Wallet -->
              <div class="flex items-center space-x-0.5 sm:space-x-1 border-r border-white/10 pr-2 sm:pr-4">
                <a routerLink="/dashboard" routerLinkActive="!bg-primary !text-white"
                  [routerLinkActiveOptions]="{exact: true}"
                  class="px-2 sm:px-3 py-1 sm:py-1.5 md:py-2 rounded-lg text-xs sm:text-sm font-medium text-white/70 hover:text-white hover:bg-white/10 transition">Home</a>

                <!-- Bookings link — desktop only, mobile moved to dropdown -->
                <a routerLink="/bookings" routerLinkActive="!bg-primary !text-white"
                  class="hidden sm:block px-2 sm:px-3 py-1 sm:py-1.5 md:py-2 rounded-lg text-xs sm:text-sm font-medium text-white/70 hover:text-white hover:bg-white/10 transition">Bookings</a>
              </div>

              <!-- Wallet Display -->
              <a routerLink="/wallet"
                class="flex items-center bg-white/10 border border-white/20 hover:border-white/40 hover:bg-white/15 px-1.5 sm:px-3 py-1 sm:py-1.5 rounded-md sm:rounded-lg text-[11px] sm:text-[13px] font-bold text-white mr-0.5 sm:mr-1 transition-all cursor-pointer group">
                <div
                  class="bg-primary text-white rounded p-1 sm:p-2 mr-1 sm:mr-2 shadow-sm group-hover:scale-110 transition-transform">
                  <lucide-icon name="wallet" [size]="12" class="sm:!w-[18px] sm:!h-[18px]"></lucide-icon>
                </div>
                ₹{{ (balance$ | async) | number:'1.0-0' }}
              </a>
            </div>

            <!-- User Dropdown Menu -->
            <div
              class="relative ml-1.5 md:ml-4 flex items-center border-l border-white/10 pl-1.5 md:pl-4">
              <button (click)="isUserDropdownOpen = !isUserDropdownOpen"
                class="flex items-center gap-1 sm:gap-2 outline-none p-0.5 sm:p-1.5 pr-1.5 sm:pr-3 rounded-md sm:rounded-lg transition border relative z-50 cursor-pointer"
                [ngClass]="isUserDropdownOpen ? 'bg-white/20 border-primary/50 shadow-md shadow-primary/20' : 'bg-white/10 hover:bg-white/15 border-white/20'">
                <div
                  class="w-6 h-6 sm:w-8 sm:h-8 md:w-9 md:h-9 rounded-md sm:rounded-lg bg-gradient-to-br from-orange-400 to-orange-500 text-white flex items-center justify-center font-bold text-[9px] sm:text-[13px] md:text-[15px] shadow-inner uppercase tracking-wider">
                  {{ userInitial }}
                </div>
                <div class="hidden md:flex flex-col items-start px-1 text-left">
                  <span class="text-[13px] font-bold text-white leading-tight">{{ userName }}</span>
                  <span class="text-[10px] text-white/50 font-medium leading-none">Travel Agent</span>
                </div>
                <lucide-icon name="chevron-down" [size]="10"
                  class="text-white/50 sm:!w-[14px] sm:!h-[14px] md:ml-1"></lucide-icon>
              </button>

              <!-- Dropdown Panel -->
              <div *ngIf="isUserDropdownOpen"
                class="absolute top-full right-0 mt-2 w-48 sm:w-56 bg-white dark:bg-slate-800 rounded-xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden py-1 sm:py-2 z-50 animate-in fade-in slide-in-from-top-2 origin-top-right">
                <div class="px-3 sm:px-4 py-2 sm:py-3 border-b border-slate-100 dark:border-slate-700/80 mb-0.5">
                  <p class="text-xs sm:text-sm font-bold text-slate-900 dark:text-white truncate">{{ userFullName }}</p>
                  <p class="text-[10px] sm:text-[11px] text-slate-500 truncate mt-0.5" [title]="userEmail">
                    {{ userEmail }}</p>
                </div>
                <a routerLink="/account-settings" (click)="isUserDropdownOpen = false"
                  class="flex items-center gap-2.5 px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-[13px] font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-primary transition-colors cursor-pointer">
                  <lucide-icon name="user" [size]="14" class="text-slate-400 sm:!w-4 sm:!h-4"></lucide-icon>
                  My Account
                </a>
                <a routerLink="/bookings" (click)="isUserDropdownOpen = false"
                  class="flex items-center gap-2.5 px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-[13px] font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-primary transition-colors cursor-pointer">
                  <lucide-icon name="briefcase" [size]="14" class="text-slate-400 sm:!w-4 sm:!h-4"></lucide-icon>
                  My Bookings
                </a>
                <a routerLink="/reports" (click)="isUserDropdownOpen = false"
                  class="flex items-center gap-2.5 px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-[13px] font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-primary transition-colors cursor-pointer">
                  <lucide-icon name="file-bar-chart" [size]="14" class="text-slate-400 sm:!w-4 sm:!h-4"></lucide-icon>
                  Reports
                </a>
                <a routerLink="/markup-settings" (click)="isUserDropdownOpen = false"
                  class="flex items-center gap-2.5 px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-[13px] font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-primary transition-colors cursor-pointer">
                  <lucide-icon name="percent-circle" [size]="14" class="text-slate-400 sm:!w-4 sm:!h-4"></lucide-icon>
                  Mark-ups
                </a>
                <a routerLink="/wallet" (click)="isUserDropdownOpen = false"
                  class="flex items-center gap-2.5 px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-[13px] font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-primary transition-colors cursor-pointer">
                  <lucide-icon name="wallet" [size]="14" class="text-slate-400 sm:!w-4 sm:!h-4"></lucide-icon>
                  Wallet
                </a>
                <div class="h-px bg-slate-100 dark:bg-slate-700/80 my-0.5 sm:my-1"></div>
                <button (click)="toggleDarkMode(); isUserDropdownOpen = false"
                  class="w-full flex items-center justify-between px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-[13px] font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 hover:text-primary transition-colors cursor-pointer text-left">
                  <div class="flex items-center gap-2.5">
                    <lucide-icon name="moon" [size]="14" class="text-slate-400 dark:hidden sm:!w-4 sm:!h-4"></lucide-icon>
                    <lucide-icon name="sun" [size]="14" class="text-slate-400 hidden dark:block sm:!w-4 sm:!h-4"></lucide-icon>
                    Dark Mode
                  </div>
                  <span class="text-[9px] sm:text-[10px] text-slate-400 dark:text-slate-500 uppercase tracking-wider">
                    <span class="dark:hidden">Off</span>
                    <span class="hidden dark:inline">On</span>
                  </span>
                </button>
                <div class="h-px bg-slate-100 dark:bg-slate-700/80 my-0.5 sm:my-1"></div>
                <a (click)="onLogout()"
                  class="flex items-center gap-2.5 px-3 sm:px-4 py-2 sm:py-2.5 text-xs sm:text-[13px] font-semibold text-red-600 hover:bg-red-50 dark:hover:bg-red-900/20 transition-colors cursor-pointer">
                  <lucide-icon name="log-out" [size]="14" class="text-red-500 sm:!w-4 sm:!h-4"></lucide-icon>
                  Log Out
                </a>
              </div>
            </div>
          </div>
        </ng-container>

      </div>
    </div>
  </div>
</nav>

<!-- Logout Confirmation Modal -->
<div *ngIf="showLogoutConfirm" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
  <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-200 dark:border-slate-700 p-6 w-full max-w-sm mx-4 animate-in fade-in zoom-in-95">
    <div class="flex flex-col items-center text-center">
      <div class="w-14 h-14 rounded-full bg-red-50 dark:bg-red-900/30 flex items-center justify-center mb-4">
        <lucide-icon name="log-out" [size]="28" class="text-red-500"></lucide-icon>
      </div>
      <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-1">Logout?</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">Are you sure you want to log out of your account?</p>
      <div class="flex gap-3 w-full">
        <button (click)="cancelLogout()"
          class="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold text-slate-700 dark:text-slate-300 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors cursor-pointer">
          Cancel
        </button>
        <button (click)="confirmLogout()"
          class="flex-1 px-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-red-500 hover:bg-red-600 transition-colors shadow-sm cursor-pointer">
          Log Out
        </button>
      </div>
    </div>
  </div>
</div>
